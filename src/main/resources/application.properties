# Application
spring.application.name=advertising-system
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:advertising_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jta.enabled=true
spring.jta.atomikos.datasource.unique-resource-name=postgres

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.transaction.coordinator_class=jta
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true

# Scheduling
spring.task.scheduling.pool.size=5

# Security — JWT secret MUST be provided via env (>= 32 bytes UTF-8). No fallback.
security.jwt.secret=${JWT_SECRET:}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
security.jwt.issuer=${JWT_ISSUER:advertising-system}
security.jwt.audience=${JWT_AUDIENCE:advertising-system-api}
# Bootstrap admin — credentials MUST be provided via env. No fallback.
security.admin.username=${ADMIN_USERNAME:}
security.admin.password=${ADMIN_PASSWORD:}
# Legacy account password — supply only when seeding legacy clients/managers.
security.legacy-account-password=${LEGACY_ACCOUNT_PASSWORD:}

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:campaign-documents}
minio.presigned-url-expiration-seconds=${MINIO_PRESIGNED_URL_EXPIRATION_SECONDS:300}
