# Application
spring.application.name=advertising-system
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:advertising_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=-1

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true

# Scheduling
spring.task.scheduling.pool.size=5

# ЭДО Operator (Diadoc) Configuration
edo.moderator-box-id=${EDO_MODERATOR_BOX_ID:stub-moderator-box}
edo.client-box-id=${EDO_CLIENT_BOX_ID:stub-client-box}

# Real Diadoc API settings (only needed with profile "diadoc-prod")
edo.diadoc.api-url=${EDO_DIADOC_API_URL:https://diadoc-api.kontur.ru}
edo.diadoc.api-key=${EDO_DIADOC_API_KEY:}
