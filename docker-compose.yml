services:
  db:
    image: postgres:16-alpine
    container_name: advertising-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: advertising_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d advertising_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: advertising-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: advertising_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      FLYWAY_ENABLED: "true"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
